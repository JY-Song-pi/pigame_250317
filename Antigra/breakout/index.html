<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>π BREAKOUT — Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

    <!-- 헤더: 점수 / 스테이지 / 목숨 -->
    <header id="game-header">
        <div class="logo-area">
            <a href="../index.html" class="btn-back">← Hub</a>
            <span class="game-title">π BREAKOUT</span>
        </div>
        <div class="stats-area">
            <div class="stat-box"><span class="stat-label">SCORE</span><span id="score" class="stat-value">0</span></div>
            <div class="stat-box"><span class="stat-label">STAGE</span><span id="stage" class="stat-value gold">1</span></div>
            <div class="stat-box"><span class="stat-label">LIVES</span><span id="lives" class="stat-value">♥♥♥</span></div>
            <button id="btn-mute" class="mute-btn" title="음소거 토글">🔊</button>
        </div>
    </header>

    <!-- 캔버스 영역: 헤더 아래 ~ 하단 컨트롤 위까지 자동으로 채움 -->
    <div id="canvas-area">
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- 하단 컨트롤: 항상 화면 맨 아래 고정 -->
    <div id="controls">
        <div id="joystick-container"></div>
        <div id="move-group">
            <div id="btn-left"  class="ctrl-btn" aria-label="Left">◀</div>
            <div id="btn-right" class="ctrl-btn" aria-label="Right">▶</div>
        </div>
        <div id="btn-pause" class="ctrl-btn pause-btn" aria-label="Pause">⏸</div>
    </div>

    <!-- 오버레이: body 직속 자식 (backdrop-filter 클리핑 없음) -->
    <div id="start-overlay" class="overlay active">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">π BREAKOUT</h2>
        <p class="ov-desc">Pi Network 공식 벽돌깨기<br>모든 벽돌을 파괴하라!</p>
        <button id="btn-start"  class="btn primary">▶ GAME START</button>
        <button id="btn-login"  class="btn secondary">π Pi Login</button>
        <p class="ov-hint">💡 게임 중 화면을 위로 스와이프하거나 탭하면 볼이 발사됩니다</p>
        <p id="user-info" class="ov-user"></p>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title danger">GAME OVER</h2>
        <div class="result-box">
            <div class="result-row"><span>최종 점수</span><span id="final-score" class="rv">0</span></div>
            <div class="result-row"><span>도달 스테이지</span><span id="final-stage" class="rv">1</span></div>
            <div class="result-row"><span>최고 점수</span><span id="best-disp" class="rv gold">0</span></div>
        </div>
        <button id="btn-restart" class="btn primary">▶ 처음부터 다시 (♥×3)</button>
        <button id="btn-revive"  class="btn secondary">↩ 이 스테이지 재시작 (♥×3)</button>
    </div>

    <div id="stage-clear-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title success">STAGE CLEAR!</h2>
        <div class="result-box">
            <div class="result-row"><span>현재 점수</span><span id="clear-score" class="rv">0</span></div>
        </div>
        <button id="btn-next-stage" class="btn primary">▶ 다음 스테이지</button>
    </div>

    <div id="pause-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">PAUSED</h2>
        <button id="btn-resume" class="btn primary">▶ RESUME</button>
    </div>

    <script src="js/piIntegration.js?v=2026"></script>
    <script src="js/audio.js?v=2026"></script>
    <script src="js/joystick.js?v=2026"></script>
    <script src="js/breakoutLogic.js?v=2026"></script>
    <script src="js/app.js?v=2026"></script>
</body>
</html>
