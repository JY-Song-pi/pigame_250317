<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>π GALAGA — Pi Network Arcade</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=200">
</head>
<body>
    <!-- ═══ 헤더: 최상단 고정 (flex-shrink: 0) ═══ -->
    <header id="game-header">
        <div class="logo-area">
            <a href="../index.html" class="btn-back">← Hub</a>
            <span class="game-title">π GALAGA</span>
        </div>
        <div class="stats-area">
            <div class="stat-box"><span class="stat-label">SCORE</span><span id="score" class="stat-value">0</span></div>
            <div class="stat-box"><span class="stat-label">π EARNED</span><span id="pi-earned" class="stat-value gold">0.000</span></div>
            <div class="stat-box"><span class="stat-label">LIVES</span><span id="lives" class="stat-value">♥♥♥</span></div>
            <button id="btn-mute" class="mute-btn">🔊</button>
        </div>
    </header>

    <!-- ═══ 게임 영역: 중앙 자동 확장 (flex: 1) ═══ -->
    <main id="canvas-area">
        <div id="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
        </div>
    </main>

    <!-- ═══ 하단 컨트롤: 최하단 고정 (flex-shrink: 0) ═══ -->
    <footer id="controls">
        <div class="control-flex">
            <div id="joystick-container"></div>
            <div class="action-group">
                <button id="btn-fire" class="ctrl-btn fire">FIRE</button>
                <button id="btn-pause" class="ctrl-btn pause">⏸</button>
            </div>
            <div class="movement-group" style="display:none;">
                <button id="btn-left" class="ctrl-btn">◀</button>
                <button id="btn-right" class="ctrl-btn">▶</button>
            </div>
        </div>
    </footer>

    <!-- ═══ 오버레이 (Body 직속, position: fixed) ═══ -->
    <div id="start-overlay" class="overlay active">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">π GALAGA</h2>
        <p class="ov-desc">외계 함대를 격파하고<br>π 코인 보상을 획득하라!</p>
        <div class="pi-reward-info">
            <div class="reward-item"><span>🚀 일반 적군</span><strong>+50</strong></div>
            <div class="reward-item"><span>👾 정예 보스</span><strong>+150</strong></div>
            <div class="reward-item"><span>💰 황금 π 기체</span><strong class="gold">+500 (+0.005π)</strong></div>
        </div>
        <button id="btn-start" class="btn primary">▶ MISSION START</button>
        <button id="btn-login" class="btn secondary">π Pi Login</button>
        <p id="user-info" class="ov-user"></p>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title danger">MISSION FAILED</h2>
        <div class="result-box">
            <div class="result-row"><span>최종 점수</span><span id="final-score" class="rv">0</span></div>
            <div class="result-row"><span>최고 점수</span><span id="final-best" class="rv">0</span></div>
            <div class="result-row pi-result"><span>획득한 π</span><span id="final-pi" class="rv gold">0.000π</span></div>
        </div>
        <button id="btn-restart" class="btn primary">▶ RE-DEPLOY (재출격)</button>
        <button id="btn-claim" class="btn warning" style="display:none;">π 보상 수령</button>
        <a href="../index.html" class="btn secondary">← Back to Hub</a>
    </div>

    <div id="pause-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">PAUSED</h2>
        <button id="btn-resume" class="btn primary">▶ RESUME Mission</button>
    </div>

    <script src="js/piIntegration.js?v=200"></script>
    <script src="js/audio.js?v=200"></script>
    <script src="js/joystick.js?v=200"></script>
    <script src="js/galagaLogic.js?v=200"></script>
    <script src="js/app.js?v=200"></script>
</body>
</html>
