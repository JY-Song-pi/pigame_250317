<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>π SNAKE — Pi Network Arcade</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
    <!-- ═══ 헤더: 최상단 고정 (flex-shrink: 0) ═══ -->
    <header id="game-header">
        <div class="logo-area">
            <a href="../index.html" class="btn-back">← Hub</a>
            <span class="game-title">π SNAKE</span>
        </div>
        <div class="stats-area">
            <div class="stat-box"><span class="stat-label">SCORE</span><span id="score" class="stat-value">0</span></div>
            <div class="stat-box"><span class="stat-label">BEST</span><span id="best-score" class="stat-value">0</span></div>
            <button id="btn-mute" class="mute-btn">🔊</button>
        </div>
    </header>

    <!-- ═══ 게임 영역: 중앙 자동 확장 (flex: 1) ═══ -->
    <main id="canvas-area">
        <div id="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
        </div>
    </main>

    <!-- ═══ 하단 컨트롤: 모바일 방향키 ═══ -->
    <footer id="controls">
        <div class="control-hint">Swipe or Use Buttons to Move</div>
        <div class="dpad">
            <button id="btn-up" class="ctrl-btn up">▲</button>
            <div class="dpad-mid">
                <button id="btn-left" class="ctrl-btn left">◀</button>
                <div class="dpad-center">π</div>
                <button id="btn-right" class="ctrl-btn right">▶</button>
            </div>
            <button id="btn-down" class="ctrl-btn down">▼</button>
        </div>
        <button id="btn-pause" class="ctrl-btn pause">⏸</button>
    </footer>

    <!-- ═══ 오버레이 (Body 직속, position: fixed) ═══ -->
    <div id="start-overlay" class="overlay active">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">π SNAKE</h2>
        <p class="ov-desc">방향을 조종해 π 열매를 먹고<br>몸집을 키워 최고 점수에 도전하라!</p>
        <div class="pi-reward-info">
            <div class="reward-item"><span>🍎 일반 사과</span><strong>+10</strong></div>
            <div class="reward-item"><span>✨ 골든 π</span><strong>+50</strong></div>
        </div>
        <button id="btn-start" class="btn primary">▶ START SNAKE</button>
        <button id="btn-login" class="btn secondary">π Pi Login</button>
        <p id="user-info" class="ov-user"></p>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title danger">CRASHED!</h2>
        <div class="result-box">
            <div class="result-row"><span>최종 점수</span><span id="final-score" class="rv">0</span></div>
            <div class="result-row"><span>최고 점수</span><span id="final-best" class="rv">0</span></div>
            <div class="result-row pi-result"><span>획득 π 보상</span><span id="final-pi" class="rv gold">0.0000</span></div>
        </div>
        <button id="btn-restart" class="btn primary">▶ 다시 시작 (RESTART)</button>
        <a href="../index.html" class="btn secondary">← Back to Hub</a>
    </div>

    <div id="pause-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">PAUSED</h2>
        <button id="btn-resume" class="btn primary">▶ RESUME Game</button>
    </div>

    <script src="js/piIntegration.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/snakeLogic.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
