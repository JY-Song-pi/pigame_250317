<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>π GO-STOP — Pi Network Arcade</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <!-- ═══ 헤더: 최상단 고정 (flex-shrink: 0) ═══ -->
    <header id="game-header">
        <div class="logo-area">
            <a href="../index.html" class="btn-back">← Hub</a>
            <span class="game-title">π GO-STOP</span>
        </div>
        <div class="stats-area">
            <div class="stat-box"><span class="stat-label">ME</span><span id="myScore" class="stat-value">0</span></div>
            <div class="stat-box"><span class="stat-label">OPP</span><span id="oppScore" class="stat-value">0</span></div>
            <button id="btn-mute" class="mute-btn">🔊</button>
        </div>
    </header>

    <!-- ═══ 게임 영역: 중앙 자동 확장 (flex: 1) ═══ -->
    <main id="canvas-area">
        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="messageBox" class="message-bubble hidden">게임이 시작되었습니다!</div>
        </div>
    </main>

    <!-- ═══ 하단 컨트롤 (필요 시 버튼 추가 가능) ═══ -->
    <footer id="controls" class="hidden">
        <!-- 고스톱은 주로 마우스/터치로 패를 선택하므로 기본 버튼은 최소화 -->
        <div class="control-hint">가져올 패를 터치하세요</div>
    </footer>

    <!-- ═══ 오버레이 (Body 직속, position: fixed) ═══ -->
    <div id="start-overlay" class="overlay active">
        <div class="ov-bg">π</div>
        <h2 class="ov-title">π GO-STOP</h2>
        <p class="ov-desc">전통의 재미와 파이의 만남!<br>전략적인 선택으로 승리하고 π를 획득하세요.</p>
        <button id="btnStartGame" class="btn primary">▶ 게임 시작 (START)</button>
        <button id="btnPiAuth" class="btn secondary">π Pi Login</button>
        <p id="user-info" class="ov-user"></p>
    </div>

    <!-- 의사결정 모달 (고/스톱 선택) -->
    <div id="decisionModal" class="overlay">
        <div class="modal-content glass">
            <h2 class="ov-title">선택의 시간!</h2>
            <p class="ov-desc">점수를 달성했습니다. 계속하시겠습니까?</p>
            <div class="btn-group">
                <button id="btnGo" class="btn primary">GO! (계속)</button>
                <button id="btnStop" class="btn secondary">STOP (승리)</button>
            </div>
        </div>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="ov-bg">π</div>
        <h2 id="over-title" class="ov-title">GAME SET</h2>
        <div class="result-box">
            <div class="result-row"><span>내 최종 점수</span><span id="final-my-score" class="rv">0</span></div>
            <div class="result-row"><span>상대 점수</span><span id="final-opp-score" class="rv">0</span></div>
            <div class="result-row pi-result"><span>보너스 보상</span><span id="final-pi" class="rv gold">0.0000 π</span></div>
        </div>
        <button id="btn-restart" class="btn primary">▶ 다음 판 시작 (RETRY)</button>
        <a href="../index.html" class="btn secondary">← Back to Hub</a>
    </div>

    <!-- 분리된 모듈 스크립트 -->
    <script src="js/piIntegration.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/gostopLogic.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
